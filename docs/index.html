<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OhEarningsCal · 美股财报日历订阅</title>
  <meta name="description" content="把美股财报日程订阅到你的日历软件。每天自动更新，覆盖纳斯达克 100、标普 500、道琼斯 30。" />
  <style>
    :root {
      --bg: #fafaf9;
      --fg: #1c1917;
      --muted: #78716c;
      --line: #e7e5e4;
      --card: #ffffff;
      --accent: #1c1917;
      --accent-fg: #fafaf9;
      --code-bg: #f5f5f4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0a09;
        --fg: #fafaf9;
        --muted: #a8a29e;
        --line: #292524;
        --card: #1c1917;
        --accent: #fafaf9;
        --accent-fg: #1c1917;
        --code-bg: #1c1917;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 64px 24px 96px;
    }
    header { margin-bottom: 56px; }
    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }
    h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 16px;
      line-height: 1.2;
    }
    .lede {
      font-size: 18px;
      color: var(--muted);
      margin: 0 0 8px;
      max-width: 56ch;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 48px 0 20px;
    }
    .cards { display: grid; gap: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px 22px;
      display: grid;
      grid-template-columns: 40px 1fr auto;
      gap: 16px;
      align-items: center;
      transition: border-color 120ms ease, transform 120ms ease;
    }
    .card:hover { border-color: var(--fg); }
    .icon {
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      background: var(--code-bg);
      border-radius: 8px;
    }
    .meta { min-width: 0; }
    .name {
      font-weight: 600;
      font-size: 15px;
      margin: 0;
    }
    .desc {
      font-size: 13px;
      color: var(--muted);
      margin: 2px 0 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .actions { display: flex; gap: 8px; }
    .btn {
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--fg);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .btn:hover { background: var(--code-bg); border-color: var(--fg); }
    .btn.primary {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }
    .btn.primary:hover { opacity: 0.85; }
    .btn .copied {
      display: none;
    }
    .btn.is-copied .label { display: none; }
    .btn.is-copied .copied { display: inline; }
    .help {
      margin-top: 56px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
    }
    .help h3 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 12px;
    }
    .help ol {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      font-size: 14px;
    }
    .help li { margin-bottom: 6px; }
    .help li:last-child { margin-bottom: 0; }
    code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      background: var(--code-bg);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.92em;
    }
    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: space-between;
    }
    footer a { color: var(--fg); text-decoration: none; border-bottom: 1px solid var(--line); }
    footer a:hover { border-color: var(--fg); }
    @media (max-width: 540px) {
      main { padding: 40px 20px 64px; }
      h1 { font-size: 28px; }
      .lede { font-size: 16px; }
      .card {
        grid-template-columns: 40px 1fr;
        grid-template-rows: auto auto;
      }
      .actions { grid-column: 1 / -1; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">OhEarningsCal</p>
      <h1>美股财报日历，<br/>订阅到你的日历软件</h1>
      <p class="lede">
        每天自动从纳斯达克拉取未来 30 天的财报日程，生成 ics 订阅链接。
        覆盖纳斯达克 100、标普 500、道琼斯 30，以及自定义关注列表。
      </p>
    </header>

    <h2>订阅链接</h2>
    <div class="cards" id="cards"></div>

    <section class="help">
      <h3>如何订阅</h3>
      <ol>
        <li><strong>iOS / macOS Calendar</strong>：复制订阅链接 → 文件 → 新建日历订阅 → 粘贴。</li>
        <li><strong>Google Calendar</strong>：左侧"其他日历"右侧 + 号 → 通过网址添加 → 粘贴。</li>
        <li><strong>Outlook</strong>：日历 → 添加日历 → 从网络订阅 → 粘贴。</li>
      </ol>
    </section>

    <footer>
      <span>每天 UTC 04:34 / 16:34 自动更新</span>
      <a href="https://github.com/jason5ng32/OhEarningsCal" target="_blank" rel="noopener">GitHub</a>
    </footer>
  </main>

  <script>
    const ICS_LIST = [
      { slug: 'selected',    icon: '⭐', name: '精选合集',     desc: '指数成分股 + 自定义关注，去重' },
      { slug: 'nasdaq100',   icon: '💻', name: '纳斯达克 100', desc: 'Nasdaq-100 成分股' },
      { slug: 'sp500',       icon: '📈', name: '标普 500',     desc: 'S&P 500 成分股' },
      { slug: 'dow30',       icon: '🏛️', name: '道琼斯 30',    desc: 'Dow Jones Industrial Average 30 支' },
      { slug: 'customstock', icon: '🎯', name: '自定义关注',   desc: '由仓库环境变量 CUSTOM_STOCKS 决定' },
      { slug: 'all',         icon: '🌐', name: '全部财报',     desc: '所有上市公司，体积较大' },
    ];

    const baseURL = new URL('ics/', window.location.href).toString();

    function makeCard({ slug, icon, name, desc }) {
      const url = baseURL + slug + '.ics';
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="icon" aria-hidden="true">${icon}</div>
        <div class="meta">
          <p class="name">${name}</p>
          <p class="desc">${desc}</p>
        </div>
        <div class="actions">
          <button class="btn primary" data-copy="${url}">
            <span class="label">复制链接</span>
            <span class="copied">已复制 ✓</span>
          </button>
          <a class="btn" href="ics/${slug}.ics" download>下载</a>
        </div>
      `;
      return card;
    }

    const container = document.getElementById('cards');
    for (const item of ICS_LIST) container.appendChild(makeCard(item));

    container.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-copy]');
      if (!btn) return;
      try {
        await navigator.clipboard.writeText(btn.dataset.copy);
        btn.classList.add('is-copied');
        setTimeout(() => btn.classList.remove('is-copied'), 1500);
      } catch {
        prompt('复制此链接：', btn.dataset.copy);
      }
    });
  </script>
</body>
</html>
