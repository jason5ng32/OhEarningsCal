name: Update index constituents

on:
  schedule:
    - cron: '17 6 * * 1' # every Monday 06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/fetch/indices.js'
      - 'src/cli/fetch-indices.js'
      - 'src/config/indices.js'
      - 'src/lib/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/indices.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Refresh indices
        run: npm run fetch:indices

      - name: Commit and trigger earnings rebuild if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet -- data/indices; then
            echo "No index changes."
          else
            git add data/indices
            git commit -m "chore(indices): weekly refresh"
            git push
            # GITHUB_TOKEN-pushed commits don't trigger other workflows by
            # design, so explicitly kick off the earnings build with the
            # fresh constituents.
            gh workflow run earnings.yml --ref main
          fi
