name: Update earnings calendar

on:
  schedule:
    - cron: '34 4,16 * * *' # 04:34 and 16:34 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'data/indices/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/earnings.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Restore earnings cache
        uses: actions/cache@v5
        with:
          path: data/earnings
          key: earnings-${{ github.run_id }}
          restore-keys: |
            earnings-

      - name: Fetch earnings window
        run: pnpm run fetch
        env:
          SHOULD_GEN_SELECTED: ${{ vars.SHOULD_GEN_SELECTED }}
          SHOULD_GEN_ALL: ${{ vars.SHOULD_GEN_ALL }}

      - name: Generate ics files
        run: pnpm run gen
        env:
          SHOULD_GEN_SELECTED: ${{ vars.SHOULD_GEN_SELECTED }}
          SHOULD_GEN_ALL: ${{ vars.SHOULD_GEN_ALL }}
          CUSTOM_STOCKS: ${{ vars.CUSTOM_STOCKS }}

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - id: deploy
        uses: actions/deploy-pages@v5
